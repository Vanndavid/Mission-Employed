name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:
    branches: [main]

# Phase 4: add Postgres service container for relational schema tests
# services:
#   postgres:
#     image: postgres:16
#     env:
#       POSTGRES_PASSWORD: test
#     ports: ['5432:5432']

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: cd server && npm ci
      - run: cd server && NODE_ENV=test npm test
